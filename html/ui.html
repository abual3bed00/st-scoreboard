<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7/css/all.min.css">
    <link rel="stylesheet" href="./reset.css" />
    <link rel="stylesheet" href="./style.css" />

    <title>INSIGHT SCOREBOARD</title>
</head>

<body>
    <div class="container">
        <div class="scoreboard-block">
            <!-- Header -->
            <div class="scoreboard-header">
                <div class="header-left">
                    <i class="fa-solid fa-bars-staggered"></i>
                    <span>SCOREBOARD</span>
                </div>
                <div class="header-right">
                    <div class="ping-indicator">
                        <i class="fas fa-wifi"></i>
                        <span id="server-ping">24ms</span>
                    </div>
                </div>
            </div>

            <!-- Stats Cards (ثلاث بطاقات) -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-users"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Online</span>
                        <span class="stat-value" id="online-players">0</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Uptime</span>
                        <span class="stat-value" id="server-uptime">0h 0m</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Local Time</span>
                        <span class="stat-value" id="local-time">00:00:00</span>
                    </div>
                </div>
            </div>

            <!-- Job Statistics -->
            <div class="jobs-container">
                <div class="jobs-header">
                    <i class="fas fa-briefcase"></i>
                    <span>Online by Job</span>
                </div>
                <div class="jobs-grid" id="jobs-container">
                    <!-- يتم تعبئتها ديناميكياً -->
                </div>
            </div>

            <!-- Kidnap Settings -->
            <div class="kidnap-container">
                <div class="scoreboard-info-beam" data-type="civilian">
                    <div class="info-beam-title">
                        <i class="fas fa-user"></i>
                        <p>Kidnap Civilian</p>
                    </div>
                    <div class="info-beam-status" id="status-civilian"></div>
                </div>
                <div class="scoreboard-info-beam" data-type="police">
                    <div class="info-beam-title">
                        <i class="fa-solid fa-user-shield"></i>
                        <p>Kidnap Police</p>
                    </div>
                    <div class="info-beam-status" id="status-police"></div>
                </div>
            </div>

            <!-- Activity Sections -->
            <div class="activity-title">
                <i class="fas fa-bolt"></i>
                <h3>Active Operations</h3>
            </div>

            <div class="scoreboard-info">
                <!-- الأنشطة -->
                <div class="scoreboard-info-beam" data-type="storerobbery">
                    <div class="info-beam-title">
                        <i class="fas fa-shop"></i>
                        <p>Store Robbery</p>
                    </div>
                    <div class="info-beam-status" id="status-storerobbery"></div>
                </div>
                <div class="scoreboard-info-beam" data-type="bankrobbery">
                    <div class="info-beam-title">
                        <i class="fas fa-university"></i>
                        <p>Bank Robbery</p>
                    </div>
                    <div class="info-beam-status" id="status-bankrobbery"></div>
                </div>
                <div class="scoreboard-info-beam" data-type="jewellery">
                    <div class="info-beam-title">
                        <i class="fas fa-gem"></i>
                        <p>Jewellery</p>
                    </div>
                    <div class="info-beam-status" id="status-jewellery"></div>
                </div>
                <div class="scoreboard-info-beam" data-type="pacific">
                    <div class="info-beam-title">
                        <i class="fas fa-building"></i>
                        <p>Pacific Bank</p>
                    </div>
                    <div class="info-beam-status" id="status-pacific"></div>
                </div>
                <div class="scoreboard-info-beam" data-type="paleto">
                    <div class="info-beam-title">
                        <i class="fas fa-tree"></i>
                        <p>Paleto Bay Bank</p>
                    </div>
                    <div class="info-beam-status" id="status-paleto"></div>
                </div>
            </div>

            <!-- Total Players Progress -->
            <div class="total-players-container">
                <div class="total-label">
                    <i class="fas fa-user-check"></i>
                    <span>Total Players</span>
                </div>
                <div class="progress-wrapper">
                    <div class="progress-bar">
                        <div class="progress-fill" id="player-progress" style="width: 0%;"></div>
                    </div>
                    <span class="progress-text" id="total-players">0/0</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script>window.jQuery || document.write('<script src="jquery-3.6.0.min.js"><\/script>')</script>
    <script src="./app.js"></script>
</body>

</html>
